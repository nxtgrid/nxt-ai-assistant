# =============================================================================
# Ingress Rules
# =============================================================================
ingress:
  rules:
    - component:
        name: anansi-bot
      match:
        path:
          prefix: /chat
    - component:
        name: anansi-bot
      match:
        path:
          prefix: /mini-app
    - component:
        name: anansi-bot
      match:
        path:
          prefix: /api/mini-app
    - component:
        name: anansi-app
      match:
        path:
          prefix: /

# =============================================================================
# Services
# =============================================================================
services:
  # ---------------------------------------------------------------------------
  # anansi-bot — Gemini orchestrator + MCP tools (consolidated, no HTTP bridge).
  # chat_orchestrator/Dockerfile bundles mcp_servers/ on PYTHONPATH.
  # ---------------------------------------------------------------------------
  - name: anansi-bot
    github:
      repo: your-org/your-repo
      branch: main
      deploy_on_push: true
    dockerfile_path: chat_orchestrator/Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xs  # 1GB RAM (LPP layout + footprints need headroom)
    health_check:
      http_path: /health
      initial_delay_seconds: 10
      period_seconds: 30
    envs:
      - key: JIRA_PROJECT_KEY
        value: "OPS"
        scope: RUN_TIME
      - key: JIRA_ISSUE_TYPE
        value: "Task"
        scope: RUN_TIME
      - key: VERIFICATION_ENABLED
        value: "true"
        scope: RUN_TIME
      - key: VERIFICATION_DOC_ID
        value: "your-verification-doc-id"
        scope: RUN_TIME
      - key: VERIFICATION_MODEL
        value: "gemini-2.5-flash-lite"
        scope: RUN_TIME
      - key: LANGFUSE_ENABLED
        value: "true"
        scope: RUN_TIME
      - key: LANGFUSE_SECRET_KEY
        value: "${LANGFUSE_SECRET_KEY}"
        scope: RUN_TIME
        type: SECRET
      - key: LANGFUSE_PUBLIC_KEY
        value: "your-langfuse-public-key"
        scope: RUN_TIME
      - key: LANGFUSE_HOST
