        scope: RUN_TIME
      - key: LPP_TEMPLATE_ID
        value: ""
        scope: RUN_TIME
      - key: LPP_OUTPUT_FOLDER_ID
        value: ""
        scope: RUN_TIME
      - key: QGIS_TEMPLATE_FILE_ID
        value: ""
