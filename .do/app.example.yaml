  # ---------------------------------------------------------------------------
  # anansi-app — Streamlit admin UI + broadcast scheduler (background process).
  # ---------------------------------------------------------------------------
  - name: anansi-app
    github:
      repo: your-org/your-repo
      branch: main
      deploy_on_push: true
    dockerfile_path: anansi_app/Dockerfile
    http_port: 8501
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /_stcore/health
      initial_delay_seconds: 60
      period_seconds: 30
      timeout_seconds: 10
    envs:
