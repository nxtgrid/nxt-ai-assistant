# =============================================================================
# DigitalOcean App Platform Spec — EXAMPLE TEMPLATE
#
# This lists EVERY environment variable the running app uses, so you know what
# to set. Replace placeholders before deploying:
#   * "${VARNAME}" + "type: SECRET"  -> a credential. Supply your own value;
#     DigitalOcean encrypts it once set. These are fake/non-functional here.
#   * "your-*", "example.com", "YOUR_COMPANY", empty ""  -> non-secret config
#     (hosts, doc IDs, org names). Replace with your own; "" disables optional
#     integrations until configured.
#   * Plain values (booleans, model names, numeric tunables) are sane defaults
#     you can usually keep.
# See the "Deployment" section in README.md for the full walkthrough.
#
# ---------------------------------------------------------------------------
# DO SPEC SAFETY — READ BEFORE UPDATING A LIVE APP
# ---------------------------------------------------------------------------
# NEVER run `doctl apps update --spec .do/app.yaml` against a deployed app: it
# OVERWRITES DigitalOcean's encrypted secrets (EV[1:...]) with the "${VAR}"
# placeholders below and breaks the deployment.
# Safe workflow for an existing app:
#   1. Back up first:  doctl apps spec get <app-id> > .do/spec-backup-$(date +%Y%m%d).yaml
#   2. Edit that pulled file (it retains the encrypted secrets), then:
#   3. doctl apps update <app-id> --spec /tmp/live-spec.yaml
# Copy this template to app.yaml for a FIRST deploy only; never commit app.yaml
# with real credentials.
#
# Topology: 2 services — anansi-bot (orchestrator + MCP tools, bundled in one
# image; serves /chat, /mini-app, /api/mini-app) and anansi-app (Streamlit
# admin + broadcast scheduler; serves /). Forking? change each `repo:` below.
# =============================================================================
name: anansi
region: ams

domains:
  - domain: your-app.example.com
    type: PRIMARY

